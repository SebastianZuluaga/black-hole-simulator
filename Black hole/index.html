<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Agujeros Negros</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Simulador de Agujeros Negros</h1>
            <div class="info-panel">
                <span id="fps">FPS: 0</span>
                <span id="objects-count">Objetos: 0</span>
                <span id="time-scale">Escala temporal: 1x</span>
            </div>
        </header>

        <div class="main-content">
            <div class="canvas-container">
                <canvas id="simulationCanvas"></canvas>
                <div class="zoom-controls">
                    <button id="zoom-in" class="zoom-btn">+</button>
                    <button id="zoom-out" class="zoom-btn">-</button>
                    <button id="zoom-reset" class="zoom-btn">⟲</button>
                </div>
            </div>

            <div class="controls-panel">
                <div class="section">
                    <h3>Agujero Negro</h3>
                    <div class="control-group">
                        <label>Preset:</label>
                        <select id="black-hole-preset">
                            <option value="stellar">Estelar (10 M☉)</option>
                            <option value="intermediate">Intermedio (1000 M☉)</option>
                            <option value="sagittariusA" selected>Sagitario A* (4.3M M☉)</option>
                            <option value="m87">M87* (6.5B M☉)</option>
                            <option value="custom">Personalizado</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label>Masa (M☉): <span id="mass-value">4.3M</span></label>
                        <input type="range" id="black-hole-mass" min="1" max="10" step="0.1" value="6.6">
                    </div>
                    <div class="control-group">
                        <label>
                            <input type="checkbox" id="show-event-horizon" checked>
                            Horizonte de Eventos
                        </label>
                    </div>
                    <div class="control-group">
                        <label>
                            <input type="checkbox" id="show-accretion-disk" checked>
                            Disco de Acreción
                        </label>
                    </div>
                    <div class="control-group">
                        <label>
                            <input type="checkbox" id="show-jets">
                            Jets Relativistas
                        </label>
                    </div>
                    <div class="control-group">
                        <label>
                            <input type="checkbox" id="gravitational-lensing">
                            Lente Gravitacional
                        </label>
                    </div>
                </div>

                <div class="section">
                    <h3>Añadir Objetos</h3>
                    <div class="object-buttons">
                        <button class="object-btn" data-type="planet">🌍 Planeta</button>
                        <button class="object-btn" data-type="star">⭐ Estrella</button>
                        <button class="object-btn" data-type="asteroid">☄️ Asteroide</button>
                        <button class="object-btn" data-type="neutron">💫 Estrella de Neutrones</button>
                    </div>
                    <div class="control-group">
                        <label>Velocidad inicial:</label>
                        <select id="initial-velocity">
                            <option value="orbital">Orbital estable</option>
                            <option value="escape">Velocidad de escape</option>
                            <option value="slow">Lenta</option>
                            <option value="fast">Rápida</option>
                            <option value="custom">Personalizada</option>
                        </select>
                    </div>
                </div>

                <div class="section">
                    <h3>Visualización</h3>
                    <div class="control-group">
                        <label>
                            <input type="checkbox" id="show-orbits" checked>
                            Mostrar órbitas
                        </label>
                    </div>
                    <div class="control-group">
                        <label>
                            <input type="checkbox" id="show-vectors">
                            Vectores de velocidad
                        </label>
                    </div>
                    <div class="control-group">
                        <label>
                            <input type="checkbox" id="show-grid">
                            Cuadrícula espacial
                        </label>
                    </div>
                    <div class="control-group">
                        <label>
                            <input type="checkbox" id="relativistic-effects" checked>
                            Efectos relativistas
                        </label>
                    </div>
                </div>

                <div class="section">
                    <h3>Simulación</h3>
                    <div class="simulation-controls">
                        <button id="play-pause" class="control-btn">▶️ Iniciar</button>
                        <button id="reset" class="control-btn">🔄 Reiniciar</button>
                        <button id="clear" class="control-btn">🗑️ Limpiar</button>
                    </div>
                    <div class="control-group">
                        <label>Velocidad: <span id="speed-value">1x</span></label>
                        <input type="range" id="simulation-speed" min="-2" max="3" step="0.1" value="0">
                    </div>
                    <div class="control-group">
                        <label>Precisión física:</label>
                        <select id="physics-accuracy">
                            <option value="low">Baja (rápida)</option>
                            <option value="medium" selected>Media</option>
                            <option value="high">Alta (precisa)</option>
                        </select>
                    </div>
                </div>

                <div class="section">
                    <h3>Información del Objeto</h3>
                    <div id="object-info" class="object-info">
                        <p>Haz clic en un objeto para ver sus propiedades</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="tooltip" id="tooltip"></div>
    </div>

    <script src="physics.js"></script>
    <script src="renderer.js"></script>
    <script src="controls.js"></script>
    <script src="main.js"></script>
</body>
</html>
